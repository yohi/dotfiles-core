---
- name: Initial Server Setup
  hosts: servers
  become: true
  vars_files:
    - vars.yml

  tasks:
    - name: Ensure y_ohi user exists
      ansible.builtin.user:
        name: "{{ username }}"
        shell: /bin/bash
        groups: sudo
        append: true
        generate_ssh_key: true
        ssh_key_type: ed25519
        ssh_key_file: .ssh/id_ed25519
        state: present

    - name: Configure passwordless sudo for y_ohi
      ansible.builtin.copy:
        content: "{{ username }} ALL=(ALL) NOPASSWD:ALL\n"
        dest: "/etc/sudoers.d/{{ username }}"
        owner: root
        group: root
        mode: "0440"
        validate: /usr/sbin/visudo -cf %s

    - name: Authorize local SSH public key for y_ohi
      ansible.posix.authorized_key:
        user: "{{ username }}"
        state: present
        key: "{{ lookup('ansible.builtin.file', ssh_public_key_path) }}"

    - name: Read generated SSH public key
      ansible.builtin.slurp:
        src: "/home/{{ username }}/.ssh/id_ed25519.pub"
      register: ssh_pub_key_base64

    - name: Set SSH public key fact
      ansible.builtin.set_fact:
        ssh_pub_key: "{{ ssh_pub_key_base64['content'] | b64decode | trim }}"

    - name: Display SSH public key for GitHub Deploy Key
      ansible.builtin.debug:
        msg: |
          ===========================================================
          GitHubから dotfiles をクローンするため、以下の公開鍵を
          GitHubリポジトリの Deploy Key に登録してください。

          【登録手順】
          1. ブラウザで以下のURLを開きます：
             https://github.com/yohi/dotfiles-core/settings/keys
          2. 'Add deploy key' をクリックします。
          3. Titleに任意の名前（例: 'VPS-Target-Key'）を入力します。
          4. Keyの部分に以下の公開鍵を貼り付けます：

          {{ ssh_pub_key }}

          5. 'Add key' をクリックして保存します。
          ===========================================================
      when: github_token | default('') | length == 0

    - name: Automatically register SSH public key as GitHub Deploy Key
      ansible.builtin.uri:
        url: "https://api.github.com/repos/yohi/dotfiles-core/keys"
        method: POST
        headers:
          Authorization: "token {{ github_token }}"
          Accept: "application/vnd.github+json"
          X-GitHub-Api-Version: "2022-11-28"
        body_format: json
        body:
          title: "VPS-Target-Key"
          key: "{{ ssh_pub_key }}"
          read_only: true
        status_code: [201]
      when: github_token | default('') | length > 0

    - name: Pause and wait for Deploy Key registration
      ansible.builtin.pause:
        prompt: "GitHubへの Deploy Key の登録が完了したら、エンターキーを押して続行してください..."
      when: github_token | default('') | length == 0

    - name: Fix bad configuration option PermitRootLogin in client ssh_config
      ansible.builtin.lineinfile:
        path: /etc/ssh/ssh_config
        regexp: '(?i)^[#\s]*permitrootlogin'
        state: absent

    - name: Clone dotfiles repository
      ansible.builtin.git:
        repo: git@github.com:yohi/dotfiles-core.git
        dest: "/home/{{ username }}/dotfiles"
        accept_hostkey: true
        version: master
      become: true
      become_user: "{{ username }}"

    - name: Check if UFW is installed
      ansible.builtin.command: which ufw
      register: ufw_check
      failed_when: false
      changed_when: false

    - name: Allow new SSH port 5310 via UFW
      community.general.ufw:
        rule: allow
        port: "{{ new_ssh_port | string }}"
        proto: tcp
      when: ufw_check.rc == 0

    - name: Check if ssh.socket is active
      ansible.builtin.systemd:
        name: ssh.socket
      register: ssh_socket_status
      failed_when: false

    - name: Disable ssh.socket and enable ssh.service if socket is active
      ansible.builtin.systemd:
        name: "{{ item.name }}"
        enabled: "{{ item.enabled }}"
        state: "{{ item.state }}"
      loop:
        - { name: "ssh.socket", enabled: false, state: "stopped" }
        - { name: "ssh", enabled: true, state: "started" }
      when:
        - ssh_socket_status.status is defined
        - ssh_socket_status.status.ActiveState is defined
        - ssh_socket_status.status.ActiveState == 'active'

    - name: Configure SSH Daemon port
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?Port\s'
        line: "Port {{ new_ssh_port }}"
        state: present
      notify: Restart SSH

    - name: Disable SSH Root Login
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin\s'
        line: "PermitRootLogin no"
        state: present
      notify: Restart SSH

    - name: Disable SSH Password Authentication
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication\s'
        line: "PasswordAuthentication no"
        state: present
      notify: Restart SSH

    - name: Flush handlers to restart SSH immediately
      ansible.builtin.meta: flush_handlers

    - name: Verify SSH connection on new port
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: "{{ new_ssh_port }}"
        state: started
        delay: 2
        timeout: 30
      delegate_to: localhost
      become: false

  handlers:
    - name: Restart SSH
      ansible.builtin.service:
        name: "{{ item }}"
        state: restarted
      loop:
        - ssh
        - sshd
      failed_when: false
